services:
  db:
    image: pgvector/pgvector:pg17
    container_name: fern-db
    environment:
      POSTGRES_USER: fern
      POSTGRES_PASSWORD: fern
      POSTGRES_DB: fern
    ports:
      - "5432:5432"
    volumes:
      - fern-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fern"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  fern-pgdata:
